<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Parallax Mapping Platform</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<link rel="stylesheet" href="https://unpkg.com/@hyvilo/maplibre-gl-draw/dist/maplibre-gl-draw.css" />
<link rel="icon" href="/assets/favicon.png" />
<style>
  html, body { margin: 0; height: 100%; font-family: 'Ronzino'; }
  #map { height: 100%; width: 100%; }
   @font-face {
  font-family: 'Ronzino';
  src: url('/fonts/Ronzino-Regular.woff2') format('woff2');
  font-weight: 400;
  }

    @font-face {
  font-family: 'Ronzino';
  src: url('/fonts/Ronzino-Medium.otf') format('woff2');
  font-weight: 500;
  }
  @font-face {
  font-family: 'Ronzino';
  src: url('/fonts/Ronzino-Bold.otf') format('woff2');
  font-weight: 700;
  }
  #status {
    position: absolute; bottom: 5px; right: 5px; z-index: 1000;
    background: white; padding: 6px 12px; border-radius: 4px;
    font-size: 13px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* Data entry modal, shown after a shape is drawn */
  #overlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center;
  }
  #form-card {
    background: white; width: 320px; max-width: 90vw;
    padding: 20px; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  #form-card h3 { margin: 0 0 12px; font-size: 16px; }
  #form-card label { display: block; font-size: 12px; color: #555; margin: 10px 0 4px; }
  #form-card input {
    width: 100%; box-sizing: border-box; padding: 6px 8px;
    font-size: 13px; border: 1px solid #ccc; border-radius: 4px;
  }
  #form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  #form-actions button {
    padding: 6px 14px; font-size: 13px; border-radius: 4px;
    border: 1px solid #ccc; background: white; cursor: pointer;
  }
  #form-actions button.primary { background: #2b6cb0; color: white; border-color: #2b6cb0; }

  .maplibregl-popup-content { font-size: 13px; }

  /* Persistent sidebar: constantly lists shape names, expands details on click */
  #sidebar {
    position: absolute; top: 5px; left: 5px; bottom: 5px;
    width: 280px; background: rgb(73, 73, 73); border-radius: 5px;
    color: white;
    box-shadow: 0 1px 8px rgba(0,0,0,0.3);
    padding: 0; overflow-y: auto; z-index: 900;
    box-sizing: border-box;
  }
  #sidebar h3 { margin: 0 0 10px; font-size: 16px; text-transform: uppercase; padding: 10px;}
  #sidebar p {color: rgb(146, 146, 146); font-size: 12px; padding: 0 10px;}
  .sidebar-item {
    border-bottom: 1px solid #eeeeee65; padding: 7px 10px; cursor: pointer; width: 100%; font-size: 12px; box-sizing: border-box;
  }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item-title {
    font-size: 13px; font-weight: 600; display: flex;
    width: 100%;
    justify-content: space-between; align-items: center; 
  }
  .sidebar-item.active .sidebar-item-title { color: #2b6cb0; }
  .sidebar-item-details {
    display: none; font-size: 12px; color: rgb(189, 189, 189); margin-top: 6px; line-height: 1.5; box-sizing: border-box;
  }
  .sidebar-item.active .sidebar-item-details { display: block; }
  .sidebar-empty { font-size: 12px; color: rgb(146, 146, 146); padding: 0 10px;}

  .sidebar-item-details input {
  width: 100%; box-sizing: border-box; padding: 4px 6px; margin: 2px 0 6px;
  font-size: 12px; border: 1px solid #ccc; border-radius: 4px;
}
.sidebar-item-details label { display: block; font-size: 11px; color: #777; }
.sidebar-edit-btn, .sidebar-save-btn {
  font-size: 11px; padding: 2px 8px; border-radius: 20px; color: white;
  border: 1px solid #2b6cb0; background: rgb(0, 100, 181); cursor: pointer;
}
.sidebar-save-btn { background: rgb(0, 100, 181); color: white; border-color: #2b6cb0; border-radius: 20px;}

.detail-label{
padding-right: 10px;
font-size: 10px;
font-weight: 500;
text-transform: uppercase;
}

.detail-value{
position: absolute;
left: 80px;
}

</style>
</head>
<body>
<div id="map"></div>
<div id="status">Loading…</div>

<div id="sidebar">
  <h3>Hostile Architecture Log</h3>
  <p>Use the tool bar on the right to add lines, polygons and points. Change existing information by clicking on edit button and save.</p>
  <div id="sidebar-list"><div class="sidebar-empty">No shapes yet</div></div>
</div>

<div id="overlay">
  <div id="form-card">
    <h3>Add details</h3>
    <form id="datapoint-form">
      <label for="f-name">Name</label>
      <input id="f-name" name="name" type="text" placeholder="e.g. River restoration zone" />

      <label for="f-start">Start date</label>
      <input id="f-start" name="start_date" type="date" />

      <label for="f-end">End date</label>
      <input id="f-end" name="end_date" type="date" />

      <label for="f-policy">Policy</label>
      <input id="f-policy" name="policy" type="text" placeholder="e.g. Clean Water Act" />

      <label for="f-cost">Cost</label>
      <input id="f-cost" name="cost" type="number" step="0.01" placeholder="e.g. 25000" />

      <label for="f-funders">Funders</label>
      <input id="f-funders" name="funders" type="text" placeholder="e.g. EU LIFE, City Council" />

      <div id="form-actions">
        <button type="button" id="cancel-btn">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@hyvilo/maplibre-gl-draw/dist/maplibre-gl-draw.js"></script>
<script>
  // This fork exposes itself under a couple of possible global names
  // depending on build — fall back gracefully so it's obvious in the
  // console if neither is present.
  const DrawCtor = window.MapLibreDraw || window.MapboxDraw;
  if (!DrawCtor) {
    console.error("Draw library did not load — check the <script> tag URL above.");
  }

  // Point this at your deployed API.
  const API_BASE = "https://parallax-map-app.onrender.com";

  // MapLibre needs an explicit style (Leaflet's tileLayer had no equivalent
  // "default" — this is the MapLibre way of saying "use plain OSM tiles").
  // const osmStyle = {
  //   version: 8,
  //   sources: {
  //     osm: {
  //       type: "raster",
  //       tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
  //       tileSize: 256,
  //       attribution: "&copy; OpenStreetMap contributors",
  //     },
  //   },
  //   layers: [{ id: "osm", type: "raster", source: "osm" }],
  // };

  const satelliteTiles ={
      version: 8,
    sources: {
      "raster-tiles": {
        type: "raster",
        tiles: [
          "https://mt0.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt2.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt3.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
        ],
        tileSize: 256,
      },
    },
    layers: [{ id: "raster-layer", type: "raster", source: "raster-tiles" }],
  };

  const map = new maplibregl.Map({
    container: "map",
    style: satelliteTiles,
    center: [1.8548053645475266,50.962380362495715],
    zoom: 12,
    minZoom: 8
  });
  map.addControl(new maplibregl.NavigationControl(), "top-right");

  map.on('style.load', () => {
    map.setProjection({
      type: 'globe'
    })
  })

  const draw = new DrawCtor({
    displayControlsDefault: false,
    controls: { point: true, line_string: true, polygon: true, trash: true },
    styles: [
    // Polygon fill (inactive/saved)
    {
      id: "gl-draw-polygon-fill",
      type: "fill",
      filter: ["all", ["==", "$type", "Polygon"], ["!=", "mode", "static"]],
      paint: { "fill-color": "red", "fill-opacity": 0.2 },
    },
    // Polygon outline
    {
      id: "gl-draw-polygon-stroke",
      type: "line",
      filter: ["all", ["==", "$type", "Polygon"], ["!=", "mode", "static"]],
      paint: { "line-color": "red", "line-width": 1.5 },
    },
    // Line strings
    {
      id: "gl-draw-line",
      type: "line",
      filter: ["all", ["==", "$type", "LineString"], ["!=", "mode", "static"]],
      paint: { "line-color": "red", "line-width": 2.5 },
    },
    // Points (vertices of the shape itself)
    {
      id: "gl-draw-point",
      type: "circle",
      filter: ["all", ["==", "$type", "Point"], ["==", "meta", "feature"], ["!=", "mode", "static"]],
      paint: {
        "circle-radius": 6,
        "circle-color": "red",
        "circle-stroke-color": "white",
        "circle-stroke-width": 2,
      },
    },
    // Vertex handles while actively drawing/editing (the small drag points on a polygon/line)
    {
      id: "gl-draw-vertex",
      type: "circle",
      filter: ["all", ["==", "meta", "vertex"], ["==", "$type", "Point"]],
      paint: { "circle-radius": 4, "circle-color": "#fff", "circle-stroke-color": "#2b6cb0", "circle-stroke-width": 2 },
    },
  ],
  });
  map.addControl(draw, "top-right");

  const statusEl = document.getElementById("status");
  const overlay = document.getElementById("overlay");
  const form = document.getElementById("datapoint-form");
  const cancelBtn = document.getElementById("cancel-btn");
  const sidebarListEl = document.getElementById("sidebar-list");

  // Local mirror of every shape's data, keyed by Draw's feature id — this is
  // what the sidebar renders from, so it stays in sync with the map.
  const shapesById = new Map();
  let activeFeatureId = null;

  function detailRows(props) {
    const rows = [
    ["Start", props.start_date],
    ["End", props.end_date],
    ["Policy", props.policy],
    ["Cost", props.cost != null && props.cost !== "" ? props.cost : null],
    ["Funders", props.funders],
  ].filter(([, value]) => value);

  if (rows.length === 0) return `<div class="detail-empty">To add more details, press Edit button</div>`;

  return rows
    .map(
      ([k, v]) => `
        <div class="detail-row">
          <span class="detail-label">${k}</span>
          <span class="detail-value">${v}</span>
        </div>
      `
    )
    .join("");
  }

  let editingFeatureId = null;

const FIELD_DEFS = [
  ["name", "Name", "text"],
  ["start_date", "Start date", "date"],
  ["end_date", "End date", "date"],
  ["policy", "Policy", "text"],
  ["cost", "Cost", "number"],
  ["funders", "Funders", "text"],
];

function editFormHtml(props) {
  return FIELD_DEFS.map(
    ([key, label, type]) => `
      <label>${label}</label>
      <input data-field="${key}" type="${type}" value="${props[key] ?? ""}" ${type === "number" ? 'step="0.01"' : ""} />
    `
  ).join("");
}

function renderSidebar() {
  if (shapesById.size === 0) {
    sidebarListEl.innerHTML = `<div class="sidebar-empty">No shapes yet</div>`;
    return;
  }
  sidebarListEl.innerHTML = "";
  shapesById.forEach((props, featureId) => {
    const isActive = featureId === activeFeatureId;
    const isEditing = featureId === editingFeatureId;

    const item = document.createElement("div");
    item.className = "sidebar-item" + (isActive ? " active" : "");

    const titleRow = document.createElement("div");
    titleRow.className = "sidebar-item-title";
    titleRow.innerHTML = `<span>${props.name || "(unnamed)"}</span>`;
    if (isActive && !isEditing) {
      const editBtn = document.createElement("button");
      editBtn.className = "sidebar-edit-btn";
      editBtn.textContent = "Edit";
      editBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        editingFeatureId = featureId;
        renderSidebar();
      });
      titleRow.appendChild(editBtn);
    }
    titleRow.addEventListener("click", () => selectFeature(featureId, { fly: true }));

    const detailsEl = document.createElement("div");
    detailsEl.className = "sidebar-item-details";

    if (isEditing) {
      detailsEl.innerHTML = editFormHtml(props);
      const saveBtn = document.createElement("button");
      saveBtn.className = "sidebar-save-btn";
      saveBtn.textContent = "Save";
      saveBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        const inputs = detailsEl.querySelectorAll("input[data-field]");
        const updated = {};
        inputs.forEach((input) => (updated[input.dataset.field] = input.value));
        await saveEdit(featureId, updated);
      });
      detailsEl.appendChild(saveBtn);
    } else {
      detailsEl.innerHTML = detailRows(props);
    }

    item.appendChild(titleRow);
    item.appendChild(detailsEl);
    sidebarListEl.appendChild(item);
  });
}

async function saveEdit(featureId, updated) {
  const props = shapesById.get(featureId);
  const dbId = props?.dbId;
  if (!dbId) return;

  try {
    const res = await fetch(`${API_BASE}/api/shapes/${dbId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(updated),
    });
    const saved = await res.json();
    const newProps = { ...saved.properties, dbId };
    shapesById.set(featureId, newProps);
    Object.entries(newProps).forEach(([k, v]) => draw.setFeatureProperty(featureId, k, v));
    editingFeatureId = null;
    renderSidebar();
    statusEl.textContent = "Shape updated";
  } catch (err) {
    console.error(err);
    statusEl.textContent = "Failed to update shape";
  }
}

  // Selects a shape both on the map (Draw's selection) and in the sidebar
  // (expands its details). Called from either a map click or a list click.
  function selectFeature(featureId, { fly = false } = {}) {
    activeFeatureId = featureId;
    draw.changeMode("simple_select", { featureIds: [featureId] });
    renderSidebar();

    if (fly) {
      const feature = draw.get(featureId);
      if (feature) {
        const coords = getRepresentativeCoords(feature.geometry);
        if (coords) map.flyTo({ center: coords, zoom: Math.max(map.getZoom(), 10) });
      }
    }
  }

  // Grabs a single [lng, lat] to fly to, regardless of geometry type.
  function getRepresentativeCoords(geometry) {
    if (!geometry) return null;
    if (geometry.type === "Point") return geometry.coordinates;
    if (geometry.type === "LineString") return geometry.coordinates[0];
    if (geometry.type === "Polygon") return geometry.coordinates[0][0];
    return null;
  }

  function popupContent(props) {
    const title = props.name ? `<strong>${props.name}</strong><br>` : "";
    return title + detailRows(props);
  }

  function promptForDetails() {
    return new Promise((resolve) => {
      form.reset();
      overlay.style.display = "flex";

      function cleanup() {
        overlay.style.display = "none";
        form.removeEventListener("submit", onSubmit);
        cancelBtn.removeEventListener("click", onCancel);
      }
      function onSubmit(e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        cleanup();
        resolve(data);
      }
      function onCancel() {
        cleanup();
        resolve(null);
      }
      form.addEventListener("submit", onSubmit);
      cancelBtn.addEventListener("click", onCancel);
    });
  }

  // Load existing shapes once the map + style are ready.
  map.on("load", async () => {
    statusEl.textContent = "Loading shapes…";
    try {
      const res = await fetch(`${API_BASE}/api/shapes`);
      const geojson = await res.json();
      geojson.features.forEach((f) => {
        // Draw assigns its own internal feature id, so keep the database id
        // as a separate property to reference on delete.
        f.properties = { ...f.properties, dbId: f.id };
        const addedId = draw.add(f)[0];
        shapesById.set(addedId, f.properties);
      });
      statusEl.textContent = `${geojson.features.length} shape(s) loaded`;
      renderSidebar();
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Could not reach the API";
    }
  });

  // Save a newly drawn shape, after collecting its data fields.
  map.on("draw.create", async (e) => {
    const feature = e.features[0];

    const details = await promptForDetails();
    if (!details) {
      draw.delete(feature.id);
      return;
    }

    const toSave = { ...feature, properties: { ...feature.properties, ...details } };
    delete toSave.id; // let the database assign its own id

    try {
      const res = await fetch(`${API_BASE}/api/shapes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(toSave),
      });
      const saved = await res.json();
      draw.setFeatureProperty(feature.id, "dbId", saved.id);
      Object.entries(details).forEach(([k, v]) => draw.setFeatureProperty(feature.id, k, v));
      shapesById.set(feature.id, { ...feature.properties, ...details, dbId: saved.id });
      renderSidebar();
      statusEl.textContent = "Shape saved";
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Failed to save shape";
    }
  });

  // Delete a shape when removed via the trash control.
  map.on("draw.delete", async (e) => {
    for (const feature of e.features) {
      shapesById.delete(feature.id);
      if (activeFeatureId === feature.id) activeFeatureId = null;
      const dbId = feature.properties?.dbId;
      if (!dbId) continue;
      try {
        await fetch(`${API_BASE}/api/shapes/${dbId}`, { method: "DELETE" });
      } catch (err) {
        console.error(err);
      }
    }
    renderSidebar();
  });

  // Clicking a shape on the map selects it in the sidebar too (no fly, since
  // the user is already looking at it).
  map.on("draw.selectionchange", (e) => {
    const feature = e.features[0];
    if (!feature) {
      activeFeatureId = null;
      renderSidebar();
      return;
    }
    activeFeatureId = feature.id;
    renderSidebar();
  });
</script>
</body>
</html>
